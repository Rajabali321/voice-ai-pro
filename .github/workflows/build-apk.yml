name: 🔨 Voice AI Pro - APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: 📦 APK Banana
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code checkout
        uses: actions/checkout@v4

      - name: ☕ Java 17 Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Gradle 8.4 Download
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip -d gradle_dist
          echo "GRADLE_HOME=$PWD/gradle_dist/gradle-8.4" >> $GITHUB_ENV
          echo "$PWD/gradle_dist/gradle-8.4/bin" >> $GITHUB_PATH

      - name: 🤖 Android SDK Setup
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 🏗️ APK Build
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: ✏️ APK Rename
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/VoiceAIPro-v3.0.apk

      - name: 📤 APK Upload
        uses: actions/upload-artifact@v4
        with:
          name: VoiceAIPro-APK
          path: release/VoiceAIPro-v3.0.apk
          retention-days: 30
