name: Voice AI Pro - APK Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle 8.4
        run: |
          echo "Downloading Gradle 8.4..."
          wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O /tmp/gradle.zip
          echo "Extracting..."
          unzip -q /tmp/gradle.zip -d /tmp/
          ls /tmp/gradle-8.4/bin/
          /tmp/gradle-8.4/bin/gradle --version
          echo "Gradle ready!"

      - name: Setup Android SDK path
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Build Debug APK
        run: |
          /tmp/gradle-8.4/bin/gradle assembleDebug --no-daemon --stacktrace

      - name: Check APK
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK ban gayi!"
            ls -lh app/build/outputs/apk/debug/
          else
            echo "APK nahi mili"
            find . -name "*.apk" 2>/dev/null
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VoiceAIPro-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
